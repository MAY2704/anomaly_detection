name: Bug report
description: Something behaves incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please fill in as much as you can.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: The exact command or code, ideally with the smallest config that shows it.
      render: shell
      placeholder: anomaly-detection --n-companies 500 --epochs 1
    validations:
      required: true

  - type: textarea
    id: metrics
    attributes:
      label: Metrics output
      description: >
        For anything affecting detection quality, paste the contents of
        runs/metrics.json.
      render: json

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12.10"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Linux, macOS, Windows, Other]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Traceback or logs
      render: shell
